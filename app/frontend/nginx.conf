# ============================================================================
# BoothBooth — nginx (client container) — infra-final.md §3
#
# The single public origin in prod. Responsibilities:
#   1. Serve the built SPA with history fallback (React Router deep links work).
#   2. Reverse-proxy /api/* to the api service, passing Cookie + Idempotency-Key
#      through untouched (same-origin => no CORS, no CSRF token).
#   3. Baseline security headers + a body-size cap on /api.
#   4. A static /healthz for the container healthcheck.
#
# Dropped into /etc/nginx/conf.d/default.conf, replacing the stock server block.
# TLS is terminated here (add a 443 server + cert) or at an edge proxy in front;
# this file assumes an edge/host terminator and forwards X-Forwarded-Proto so the
# api can mark session cookies Secure correctly. Enable HSTS once TLS is live.
# ============================================================================

# Upstream = the api compose service, resolved by Docker's embedded DNS.
upstream boothbooth_api {
    server api:4000;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Baseline security headers (internal POS tool; no embedding) ──────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Same-origin app: scripts self; connect self (relative /api). 'unsafe-inline'
    # on styles covers the lifted CSS-token <style> usage. The UI loads IBM Plex
    # (Sans/Mono) from Google Fonts — the stylesheet comes from fonts.googleapis.com
    # (style-src) and the font files from fonts.gstatic.com (font-src), so both
    # origins are allowlisted here. Without them the CSP blocks the polished fonts.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    # HSTS: uncomment once TLS terminates here or at the edge.
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Container healthcheck endpoint (static 200, no upstream) ─────────────
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # ── API reverse proxy ────────────────────────────────────────────────────
    # Cookie and Idempotency-Key are NOT stripped (nginx forwards all request
    # headers by default; we only ADD forwarding context). Body cap: carts are
    # tiny JSON, 1m is generous and blunts oversized-payload abuse.
    location /api/ {
        client_max_body_size 1m;

        proxy_pass http://boothbooth_api;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # Don't let nginx cache authenticated API responses.
        proxy_no_cache 1;
        proxy_cache_bypass 1;

        proxy_connect_timeout 5s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }

    # ── SPA: static assets with cache, history fallback for everything else ──
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
